inherits: base.yaml

task:
  name: vulnllm-qwen3.5
  type: classification

data:
  format: hf_dataset
  source: UCSB-SURFI/VulnLLM-R-Train-Data
  eval_source: UCSB-SURFI/VulnLLM-R-Test-Data
  eval_split: function_level
  input_columns:
    - code
    - language
  target_column: target
  labels:
    "0": not_vulnerable
    "1": vulnerable
  split_column: split
  split: function_level

prompt:
  system: |
    You are a security code reviewer specializing in vulnerability detection.
    Analyze the provided source code function and determine whether it contains a security vulnerability.
    Respond with exactly one word: vulnerable or not_vulnerable.
  template: |
    Analyze this {language} function and determine if it contains a security vulnerability.

    ```
    {code}
    ```
  enable_thinking: false

training:
  model: unsloth/Qwen3.5-9B
  chat_template: chatml
  max_seq_length: 4096
  epochs: 3
  batch_size: 2
  gradient_accumulation_steps: 16
  learning_rate: 2e-4
  lora:
    r: 32
    alpha: 64

export:
  lora: true
